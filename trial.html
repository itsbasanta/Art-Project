<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Auction</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  cursor: url("Image/cursor.png"), auto;
}

body {
  font-family: Arial, sans-serif;
  background-color: white;
}

.navbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem;
  border-bottom: 2px solid #ccc;
}

.logo {
  font-size: 24px;
  font-weight: bold;
  color: black;
}

.search-container {
  position: relative;
  flex-grow: 1;
  max-width: 600px;
  margin: 0 1rem;
  right: 260px;
}

input[type="text"] {
  width: 100%;
  padding: 0.5rem 2.5rem 0.5rem 1rem;
  border: 1px solid #ccc;
  border-radius: 50px;
  font-size: 16px;
}

.search-icon {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
}

.predictions {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  background-color: white;
  border: 1px solid #ccc;
  border-radius: 5px;
  max-height: 150px;
  overflow-y: auto;
  z-index: 100;
  display: none; /* Hidden by default */
}

.prediction-item {
  padding: 10px;
  cursor: pointer;
}

.prediction-item:hover {
  background-color: #f0f0f0;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 20px;
}

.nav-link {
  font-weight: bold;
  color: black;
  text-decoration: none;
}

.nav-link:hover {
  color: blue;
}

.btn {
  border: 1px solid black;
  border-radius: 25px;
  padding: 0.5rem 1rem;
  font-weight: bold;
  cursor: pointer;
  transition: background-color 0.3s;
}

.signup-btn {
  background-color: black;
  color: white;
}

.signup-btn:hover {
  background-color: blue;
}

.login-btn {
  background-color: white;
  color: black;
}

.login-btn:hover {
  background-color: blue;
}

.submenu {
  display: flex;
  justify-content: center;
  margin-top: 20px;
}

.submenu-link {
  font-weight: bold;
  color: black;
  text-decoration: none;
  margin: 0 15px;
}

.submenu-link:hover {
  color: blue;
}

.not-found-message {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background-color: rgba(255, 0, 0, 0.8);
  color: rgb(0, 0, 0);
  padding: 10px;
  border-radius: 5px;
  display: none; /* Hidden by default */
}

@media (max-width: 768px) {
  .navbar {
      flex-direction: column;
      align-items: flex-start;
  }

  .nav-links {
      margin-top: 10px;
  }

  .search-container {
      margin: 10px 0;
  }
}


.search-btn {
  position: absolute;
  right: 10px;
  top: 6px;
  background: none;
  border: none;
  cursor: pointer;
  font-size: 18px;
}



/* style.css slide show image*/

body:before{
  position: absolute;
  width: min(1400px, 90vw);
  top: 42%;
  left: 50%;
  height: 90%;
  transform: translateX(-50%);
  content: '';
  background-image: url(Image/artist.png);
  background-size: 30%;
  background-repeat: no-repeat;
  background-position: top center;
  pointer-events: none;
}
.banner{
width: 100%;
height: 100vh;
text-align: center;
overflow: hidden;
position: relative;
display: flex;
}
.banner .slider{
position: absolute;
width: 200px;
height: 200px;
top: 13%;
left: calc(50% - 100px);
transform-style: preserve-3d;
transform: perspective(1000px);
animation: autoRun 20s linear infinite;
z-index: 2;
}
@keyframes autoRun{
from{
transform: perspective(1000px) rotateX(-16deg) rotateY(0deg);
}to{
transform: perspective(1000px) rotateX(-16deg) rotateY(360deg);
}
}

.banner .slider .item{
position: absolute;
inset: 0 0 0 0;
transform: 
rotateY(calc( (var(--position) - 1) * (360 / var(--quantity)) * 1deg))
translateZ(550px);
}
.banner .slider .item img{
width: 80%;
height: 70%;
object-fit: cover;
}



/* Modal styling */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.9);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  text-align: center;
}

.modal-content {
  max-width: 80%;
  max-height: 70%;
  margin: 20px 0;
}

#modalDescription {
  color: #fff;
  font-size: 1.2rem;
  margin: 20px;
}

.modal-buttons {
  display: flex;
  gap: 20px;
}

.modal-buttons button {
  padding: 10px 20px;
  font-size: 1rem;
  cursor: pointer;
  color: white;
  background-color: #333;
  border: none;
  border-radius: 5px;
}

.modal-buttons button:hover {
  background-color: #555;
}

.close {
  position: absolute;
  top: 20px;
  left: 20px;
  font-size: 30px;
  color: white;
  cursor: pointer;
}

/* new */
.modal {
  display: none; /* Hidden by default */
  position: fixed;
  z-index: 1;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  overflow: auto;
  background-color: rgba(0, 0, 0, 0.8); /* Black background with opacity */
}

.modal-content {
  margin: auto;
  display: block;
  width: 80%;
  max-width: 700px;
}

.close {
  position: absolute;
  top: 20px;
  right: 30px;
  color: #fff;
  font-size: 35px;
  font-weight: bold;
  cursor: pointer;
}

    </style>
</head>
<body>

            <button onclick="buyItem()">Bid Price 🔨</button>

    <div id="not-found-message" class="not-found-message">No results found, sorry!</div>
    <script src="script.js"></script>
    <script>
        // Sample sentences for search predictions 
const sentencesList = [
    "Art", "Painting", "Sculpture", "Auction", "Gallery", "Exhibition", "Bidding", "Canvas", "Artisan", "Collector", "Masterpiece",
     "Contemporary", "Abstract", "Installation", "Curator", "Medium", "Palette", "Brushstroke", "Visual", "Composition", "Canvas",
      "Framing", "Authenticity", "Provenance", "Bidder", "Reserve", "Value", "Estimate", "Certificate", "Technique", "Style", "Artistic", 
      "Expression", "Creativity", "Market", "Transaction", "Lot", "Condition", "Hammer Price", "Opening Bid", "Final Bid", "Catalog",
       "Highlight", "Sales", "Gallery Owner", "Art Fair", "Collectible", "Auction House", "Private Sale", "Vernissage", "Art Critique",
       "Vincent van Gogh", "Pablo Picasso", "Leonardo da Vinci", "Claude Monet", "Jackson Pollock", "Frida Kahlo", "Georgia O'Keeffe", "Sushmita Maharjan", 
       "Basanta Sapkota" , "Shifu", "abstract", "modern", "sculpture", "oil painting", "canvas", "portrait", "landscape", "Impressionism", "expressionism", "surrealism", "contemporary", "vintage", "classic", "acrylic", "watercolor", "pastel", "etching", "sketch",
        "drawings", "lithograph", "limited edition", "original", "antique", "rare", "photography", "fine art", "bronze", "marble", "wood", "ceramics", "glass art",
         "Japanese", "Chinese", "African art", "installation", "urban art", "pop art", "graffiti", "decorative", "figurative", "minimalism", "baroque", "rococo",
          "Renaissance", "gothic", "folk art", "cubism", "art deco", "Impressionist", "Fauvism", "romanticism", "neoclassical", "street art", "contemporary realism",
           "calligraphy", "print", "handcrafted", "surreal", "mixed media", "mural", "symbolism", "museum quality", "signed", "artist proof", "giclee", "illustration",
            "poster", "vibrant", "monochrome", "conceptual", "collage", "decor", "garden sculpture", "wall art", "art glass", "ceramic sculpture", "stone sculpture",
            "metal sculpture", "landscape painting", "still life", "historical", "mid-century", "hand-painted", "limited print", "exhibition", "auction house", 
            "investment", "provenance", "gallery", "restoration", "framed", "mounting", "past master", "emerging artist", "art sale", "bidding", "private sale", 
            "commissioned", "auctioneer", "appraisal", "online auction", "live auction", "my  
       
       ];

// DOM elements
const searchInput = document.getElementById('search');
const predictionsContainer = document.getElementById('predictions');
const notFoundMessage = document.getElementById('not-found-message');

// Show predictions based on user input
function showPredictions() {
    const userInput = searchInput.value.toLowerCase();
    predictionsContainer.innerHTML = ''; // Clear previous predictions
    predictionsContainer.style.display = 'none'; // Hide predictions by default

    if (userInput) {
        const filteredSentences = sentencesList.filter(sentence =>
            sentence.toLowerCase().includes(userInput)
        );

        filteredSentences.forEach(sentence => {
            const item = document.createElement('div');
            item.classList.add('prediction-item');
            item.textContent = sentence;
            item.onclick = () => {
                searchInput.value = sentence; // Populate input on click
                predictionsContainer.style.display = 'none'; // Hide predictions
            };
            predictionsContainer.appendChild(item);
        });

        if (filteredSentences.length > 0) {
            predictionsContainer.style.display = 'block'; // Show predictions
        }
    }
}

// Perform search action
function performSearch() {
    const searchValue = searchInput.value.trim();

    if (sentencesList.some(sentence => sentence.toLowerCase() === searchValue.toLowerCase())) {
        alert("Found: " + searchValue); // Simulate found content
    } else {
        showNotFoundMessage();
    }
}

// Show 'not found' message
function showNotFoundMessage() {
    notFoundMessage.style.display = 'block';
    setTimeout(() => {
        notFoundMessage.style.display = 'none';
    }, 3000); // Message disappears after 3 seconds
}

// Ensure search box acts like a search icon when Enter is pressed
searchInput.addEventListener('keypress', (event) => {
    if (event.key === 'Enter') {
        performSearch();
    }
});






// Slide Show
// Fullscreen modal open and close functions
function openModal(imageSrc, description) {
    const modal = document.getElementById('imageModal');
    const modalImg = document.getElementById('modalImage');
    const modalDesc = document.getElementById('modalDescription');

    modal.style.display = "flex"; // Show the modal as a flex container
    modalImg.src = imageSrc;      // Set the image source
    modalDesc.textContent = description; // Set the description text
}

function closeModal() {
    const modal = document.getElementById('imageModal');
    modal.style.display = "none"; // Hide the modal
}





    </script>
